name: Update AI daily brief

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/update_brief.py
      - name: Commit refreshed issue
        run: |
          git config user.name "AI Intelligence Desk"
          git config user.email "actions@github.com"
          git add data/daily.json
          git diff --cached --quiet || git commit -m "Refresh daily AI brief"
          git push
